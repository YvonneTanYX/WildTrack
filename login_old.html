<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildTrack Portal</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --light-bg: #eef3e7;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #dfe7d9, #cfd8c5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 20px 50px;
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .logo-container { margin-bottom: 10px; }
        .zoo-logo { width: 160px; }

        h2 {
            color: var(--primary-dark);
            margin: 18px 0 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            background: transparent;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }

        .role-btn:hover { background: #e8f5e9; }
        .role-btn.active { background: var(--primary); color: white; }

        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(46, 125, 50, 0.15);
        }

        .main-btn {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
        }

        .main-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .main-btn:disabled {
            background: #aaa;
            cursor: not-allowed;
            transform: none;
        }

        .link {
            margin-top: 18px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
        }

        .link:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .hidden { display: none; }

        /* Error / Success messages */
        .msg {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: left;
            display: none;
        }
        .msg.error   { background: #fdecea; color: #c62828; border: 1px solid #f5c6cb; display: block; }
        .msg.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; display: block; }
    </style>
</head>
<body>

    <!-- ── LOGIN ── -->
    <div id="login-section" class="container">
        <div class="logo-container">
            <img src="WildTrack Logo.png" class="zoo-logo">
        </div>
        <h2>🐾 Welcome to WildTrack!</h2>

        <div class="role-selector">
            <button class="role-btn active" id="btn-visitor" onclick="setRole('visitor')">Visitor</button>
            <button class="role-btn"        id="btn-staff"   onclick="setRole('staff')">Staff</button>
        </div>

        <div id="login-msg" class="msg"></div>

        <form id="loginForm" style="width:100%" onsubmit="handleLogin(event)">
            <input type="text"     id="login-username" placeholder="Username" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button class="main-btn" id="login-btn" type="submit">Enter the Zoo</button>
        </form>

        <div class="link" onclick="showSection('signup-section')">
            New to WildTrack? Sign up here
        </div>
    </div>

    <!-- ── SIGNUP ── -->
    <div id="signup-section" class="container hidden">
        <div class="logo-container">
            <img src="WildTrack Logo.png" class="zoo-logo">
        </div>
        <h2>Join the Pack</h2>

        <div id="signup-msg" class="msg"></div>

        <form id="signupForm" style="width:100%" onsubmit="handleSignup(event)">
            <input type="text"     id="signup-username" placeholder="Username"        required>
            <input type="email"    id="signup-email"    placeholder="Email Address"   required>
            <input type="password" id="signup-password" placeholder="Create Password" required>
            <button class="main-btn" id="signup-btn" type="submit">Create Account</button>
        </form>

        <div class="link" onclick="showSection('login-section')">
            Already have an account? Log in
        </div>
    </div>

<script>
    let currentRole = 'visitor';

    // ── Role toggle ──
    function setRole(role) {
        currentRole = role;
        document.getElementById('btn-visitor').classList.toggle('active', role === 'visitor');
        document.getElementById('btn-staff').classList.toggle('active',   role === 'staff');
    }

    // ── Show/hide sections ──
    function showSection(section) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('signup-section').classList.add('hidden');
        document.getElementById(section).classList.remove('hidden');
        // Clear messages
        document.getElementById('login-msg').className  = 'msg';
        document.getElementById('signup-msg').className = 'msg';
    }

    // ── Show message helper ──
    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent  = text;
        el.className    = 'msg ' + type;
    }

    // ── LOGIN ──
    async function handleLogin(e) {
        e.preventDefault();

        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const btn      = document.getElementById('login-btn');

        btn.disabled    = true;
        btn.textContent = 'Logging in...';

        try {
            const res  = await fetch('http://localhost/WildTrack/api/auth.php?action=login', {
                method:      'POST',
                credentials: 'include',
                headers:     { 'Content-Type': 'application/json' },
                body:        JSON.stringify({ username: username, password: password })
            });

            const data = await res.json();

            if (data.success) {
                showMsg('login-msg', 'Login successful! Redirecting...', 'success');

                // Redirect based on role
                setTimeout(function() {
                    const role = data.user.role;
                    if (role === 'admin' || role === 'worker') {
                        window.location.href = 'dashboard.html'; // staff dashboard
                    } else {
                        window.location.href = 'ticketing.php'; // visitor goes to ticketing
                    }
                }, 1000);

            } else {
                showMsg('login-msg', data.message, 'error');
                btn.disabled    = false;
                btn.textContent = 'Enter the Zoo';
            }

        } catch (err) {
            showMsg('login-msg', 'Cannot connect to server. Make sure XAMPP is running.', 'error');
            btn.disabled    = false;
            btn.textContent = 'Enter the Zoo';
        }
    }

    // ── SIGNUP ──
    async function handleSignup(e) {
        e.preventDefault();

        const username = document.getElementById('signup-username').value.trim();
        const email    = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        const btn      = document.getElementById('signup-btn');

        // Map role button to DB role
        // Staff signup still registers as 'visitor' — admin assigns worker role manually
        const role = currentRole === 'staff' ? 'worker' : 'visitor';

        btn.disabled    = true;
        btn.textContent = 'Creating account...';

        try {
            const res  = await fetch('http://localhost/WildTrack/api/auth.php?action=register', {
                method:      'POST',
                credentials: 'include',
                headers:     { 'Content-Type': 'application/json' },
                body:        JSON.stringify({
                    username: username,
                    password: password,
                    email:    email,
                    role:     role
                })
            });

            const data = await res.json();

            if (data.success) {
                showMsg('signup-msg', 'Account created! Please log in.', 'success');
                setTimeout(function() {
                    showSection('login-section');
                }, 1500);
            } else {
                showMsg('signup-msg', data.message, 'error');
                btn.disabled    = false;
                btn.textContent = 'Create Account';
            }

        } catch (err) {
            showMsg('signup-msg', 'Cannot connect to server. Make sure XAMPP is running.', 'error');
            btn.disabled    = false;
            btn.textContent = 'Create Account';
        }
    }
</script>

</body>
